services:
  # Backend API Service
  - type: web
    name: hoca-backend
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      # Frontend URL (set to your Vercel domain after deploying frontend)
      - key: CLIENT_URL
        sync: false
      # AI assistant (optional - Groq recommended, free)
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # Bank QR payment (VietQR)
      - key: BANK_ID
        sync: false
      - key: BANK_ACCOUNT_NO
        sync: false
      - key: BANK_ACCOUNT_NAME
        sync: false
      - key: BANK_MEMO_PREFIX
        sync: false
      # Google OAuth (optional)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # PayOS (optional - leave empty to use bank QR only)
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
    autoDeploy: true
